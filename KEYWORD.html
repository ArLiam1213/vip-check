<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF關鍵字檢查工具（含OCR）- 優化版</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
<div class="max-w-6xl mx-auto">

    <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">📄 PDF關鍵字檢查工具</h1>
        <p class="text-sm text-gray-500 mb-6">支援電子文字PDF、掃描檔、以及文字圖片化PDF（Microsoft Print to PDF）</p>

        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 text-sm text-blue-800 rounded-r-lg">
            <strong>✨ OCR說明：</strong>支援繁體中文、簡體中文、英文、日文。<br>
            遇到「文字圖片化」或掃描PDF，會自動整頁渲染後辨識，請耐心等候。
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">0. 所屬單位（選填）</label>
                <input type="text" id="department" placeholder="例如: 財務部"
                    class="w-full border-2 border-gray-300 rounded-lg p-3 focus:border-indigo-400 outline-none transition-colors ui-input">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">OCR 語言</label>
                <select id="ocrLang" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:border-indigo-400 outline-none transition-colors ui-input">
                    <option value="chi_tra">繁體中文</option>
                    <option value="chi_sim">簡體中文</option>
                    <option value="chi_tra+chi_sim">繁體＋簡體中文</option>
                    <option value="eng">英文</option>
                    <option value="chi_tra+eng">繁體中文＋英文</option>
                    <option value="chi_sim+eng">簡體中文＋英文</option>
                    <option value="jpn">日文</option>
                </select>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">1. 上傳PDF文件（支援拖曳）</label>
            <div id="dropZone" class="w-full border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-indigo-400 hover:bg-indigo-50 transition-colors cursor-pointer ui-input">
                <input type="file" id="fileInput" multiple accept=".pdf" class="hidden">
                <div class="text-gray-500 flex flex-col items-center">
                    <span class="text-3xl mb-2">📁</span>
                    <span id="fileListText">點擊選擇檔案，或將 PDF 拖曳至此處</span>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">2. 輸入關鍵字（逗號分隔）</label>
            <textarea id="keywords" placeholder="例如: 合約, 條款, 金額"
                class="w-full border-2 border-gray-300 rounded-lg p-4 focus:border-indigo-400 outline-none transition-colors ui-input" rows="3"></textarea>
        </div>

        <div class="flex gap-4">
            <button id="searchBtn"
                class="flex-1 bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-semibold py-4 px-6 rounded-lg transition-colors shadow-md">
                🔍 開始搜尋
            </button>
            <button id="resetBtn"
                class="bg-gray-200 hover:bg-gray-300 disabled:bg-gray-100 disabled:text-gray-400 text-gray-700 font-semibold py-4 px-6 rounded-lg transition-colors ui-input">
                🗑️ 清除
            </button>
        </div>

        <div id="progressArea" class="mt-6 hidden">
            <div class="flex justify-between text-sm text-gray-600 mb-1 font-medium">
                <span id="progressLabel">準備中...</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                <div id="progressBar" class="bg-indigo-500 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
            </div>
            <div id="progressDetail" class="text-xs text-gray-400 mt-1 truncate"></div>
        </div>
    </div>

    <div id="results" class="bg-white rounded-2xl shadow-xl p-8 hidden">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">📊 搜尋結果</h2>
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="exportCSV" class="flex-1 sm:flex-none px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg text-sm shadow transition-colors">匯出 CSV</button>
                <button id="exportTXT" class="flex-1 sm:flex-none px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm shadow transition-colors">匯出 TXT</button>
            </div>
        </div>
        <div id="resultsList" class="space-y-4"></div>
        <div id="summary" class="mt-6 p-4 bg-indigo-50 rounded-lg text-sm text-indigo-800 font-medium border border-indigo-100"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    const pdfWorkerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const blob = new Blob([`importScripts('${pdfWorkerSrc}');`], { type: 'application/javascript' });
    pdfjsLib.GlobalWorkerOptions.workerPort = new Worker(URL.createObjectURL(blob));
</script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
var allResults = [];
var globalKeywordList = [];
var globalTotalFiles = 0;
var globalCompleted = 0;
var fileStorage = []; // Store selected files for drag & drop support

// Drag & Drop UI Logic
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('bg-indigo-50', 'border-indigo-400'); });
dropZone.addEventListener('dragleave', function(e) { e.preventDefault(); dropZone.classList.remove('bg-indigo-50', 'border-indigo-400'); });
dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('bg-indigo-50', 'border-indigo-400');
    if (e.dataTransfer.files.length > 0) {
        handleFiles(e.dataTransfer.files);
    }
});
fileInput.addEventListener('change', function(e) {
    if (e.target.files.length > 0) {
        handleFiles(e.target.files);
    }
});

function handleFiles(files) {
    // Append new files to existing ones
    for(var i=0; i<files.length; i++) {
        if(files[i].type === "application/pdf") {
            fileStorage.push(files[i]);
        }
    }
    updateFileListUI();
}

function updateFileListUI() {
    var n = fileStorage.length;
    var textObj = document.getElementById('fileListText');
    if (n > 0) {
        textObj.innerHTML = '<span class="font-semibold text-indigo-600">已選擇 ' + n + ' 個 PDF 文件</span><br><span class="text-xs text-gray-400">點擊或拖曳可繼續加入</span>';
    } else {
        textObj.innerHTML = '點擊選擇檔案，或將 PDF 拖曳至此處';
    }
}

// Reset Logic
document.getElementById('resetBtn').onclick = function() {
    fileStorage = [];
    document.getElementById('keywords').value = '';
    document.getElementById('department').value = '';
    fileInput.value = '';
    updateFileListUI();
    document.getElementById('results').classList.add('hidden');
    document.getElementById('progressArea').classList.add('hidden');
    allResults = [];
};

document.getElementById('searchBtn').onclick = startSearch;
document.getElementById('exportCSV').onclick = doExportCSV;
document.getElementById('exportTXT').onclick = doExportTXT;

function countRealChars(text) {
    return text.replace(/[\ue000-\uf8ff]/g, '').replace(/[\s\u0000-\u001f]/g, '').length;
}

function isRealTextPDF(totalRealChars, totalPages) {
    return (totalRealChars / Math.max(totalPages, 1)) > 50;
}

function setUIState(isProcessing) {
    var inputs = document.querySelectorAll('.ui-input');
    inputs.forEach(function(el) { el.disabled = isProcessing; });
    document.getElementById('searchBtn').disabled = isProcessing;
    document.getElementById('searchBtn').innerHTML = isProcessing ? '⏳ 處理中...' : '🔍 開始搜尋';
}

function startSearch() {
    var rawKw  = document.getElementById('keywords').value.trim();
    if (fileStorage.length === 0 || rawKw === '') { alert('請上傳文件並輸入關鍵字！'); return; }

    globalKeywordList = rawKw.split(',').map(function(k){return k.trim();}).filter(function(k){return k.length>0;});
    allResults = [];
    globalCompleted = 0;
    globalTotalFiles = fileStorage.length;

    setUIState(true);
    document.getElementById('results').classList.add('hidden');
    showProgress(true);
    setProgress(0, '初始化中...', '');
    processFilesSequential(fileStorage, 0);
}

function processFilesSequential(files, idx) {
    if (idx >= files.length) return;
    var file = files[idx];
    setProgress(
        Math.round((idx / globalTotalFiles) * 100),
        '處理檔案 ' + (idx+1) + '/' + globalTotalFiles + '：' + file.name, ''
    );
    var reader = new FileReader();
    reader.onload = function(e) {
        var data = new Uint8Array(e.target.result);
        pdfjsLib.getDocument({data: data}).promise.then(function(pdf) {
            extractAllPages(pdf, file, idx, function() {
                globalCompleted++;
                if (globalCompleted === globalTotalFiles) { showProgress(false); showResults(); setUIState(false); }
                else { processFilesSequential(files, idx + 1); }
            });
        }).catch(function(err) {
            allResults[idx] = makeErrorResult(file, '無法開啟PDF：' + err.message);
            globalCompleted++;
            if (globalCompleted === globalTotalFiles) { showProgress(false); showResults(); setUIState(false); }
            else { processFilesSequential(files, idx + 1); }
        });
    };
    reader.readAsArrayBuffer(file);
}

function extractAllPages(pdf, file, fileIdx, done) {
    var totalPages = pdf.numPages;
    var pages = new Array(totalPages);
    var totalRealChars = 0;
    var pending = totalPages;

    for (var p = 1; p <= totalPages; p++) {
        (function(pageNum) {
            pdf.getPage(pageNum).then(function(page) {
                page.getTextContent().then(function(content) {
                    var rawText = content.items.map(function(i){ return i.str; }).join(' ');
                    totalRealChars += countRealChars(rawText);
                    pages[pageNum-1] = { pageNumber: pageNum, text: rawText, ocr: false };
                    pending--;
                    if (pending === 0) {
                        if (isRealTextPDF(totalRealChars, totalPages)) {
                            buildResult(file, fileIdx, pages, false, done);
                        } else {
                            ocrAllPages(pdf, file, fileIdx, totalPages, done);
                        }
                    }
                });
            });
        })(p);
    }
}

function ocrAllPages(pdf, file, fileIdx, totalPages, done) {
    var lang = document.getElementById('ocrLang').value;

    Tesseract.createWorker(lang, 1, {
        workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
        corePath:   'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd-lstm.wasm.js',
        langPath:   'https://tessdata.projectnaptha.com/4.0.0'
    }).then(function(worker) {
        var pages = new Array(totalPages);
        var currentPage = 1;

        function processNext() {
            if (currentPage > totalPages) {
                worker.terminate();
                buildResult(file, fileIdx, pages, true, done);
                return;
            }
            var p = currentPage;
            setProgress(
                Math.round(((fileIdx + (p-1)/totalPages) / globalTotalFiles) * 100),
                '檔案 ' + (fileIdx+1) + '/' + globalTotalFiles + '：OCR 第 ' + p + '/' + totalPages + ' 頁',
                file.name
            );
            pdf.getPage(p).then(function(page) {
                var scale    = 2.5; // Slightly reduced scale for memory optimization
                var viewport = page.getViewport({scale: scale});
                var canvas   = document.createElement('canvas');
                canvas.width  = viewport.width;
                canvas.height = viewport.height;
                var ctx = canvas.getContext('2d');
                
                page.render({canvasContext: ctx, viewport: viewport}).promise.then(function() {
                    worker.recognize(canvas).then(function(result) {
                        pages[p-1] = {pageNumber: p, text: result.data.text || '', ocr: true};
                        
                        // Memory Cleanup
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        canvas.width = 0; canvas.height = 0;
                        
                        currentPage++;
                        processNext();
                    }).catch(function() {
                        pages[p-1] = {pageNumber: p, text: '', ocr: true};
                        currentPage++;
                        processNext();
                    });
                });
            });
        }
        processNext();
    }).catch(function() {
        buildResult(file, fileIdx, [], true, done);
    });
}

function buildResult(file, fileIdx, pages, wasOCR, done) {
    var result = {
        fileName: file.name, fileSize: (file.size/1024).toFixed(2) + ' KB',
        totalPages: pages.length, isScanned: wasOCR, matches: [], totalMatches: 0
    };
    
    for (var k = 0; k < globalKeywordList.length; k++) {
        var keyword = globalKeywordList[k];
        var flexKeyword = keyword.split('').map(escapeRegex).join('\\s*');
        var regex = new RegExp(flexKeyword, 'gi');
        
        var pageMatches = [], total = 0;
        for (var p = 0; p < pages.length; p++) {
            if (!pages[p] || !pages[p].text) continue;
            var text = pages[p].text;
            
            var match;
            var countInPage = 0;
            var snippets = [];
            regex.lastIndex = 0; // Reset regex state
            
            while ((match = regex.exec(text)) !== null) {
                countInPage++;
                total++;
                
                // Extract surrounding text for context (15 chars before & after)
                var start = Math.max(0, match.index - 15);
                var end = Math.min(text.length, match.index + match[0].length + 15);
                var snippetRaw = text.substring(start, end).replace(/[\r\n\s]+/g, ' '); // Clean whitespaces
                
                // Highlight the exact matched keyword in the snippet
                var matchedStr = match[0];
                var snippetHtml = snippetRaw.replace(matchedStr, '<span class="bg-yellow-200 text-yellow-900 font-bold px-1 rounded">' + matchedStr + '</span>');
                snippets.push(snippetHtml);
            }
            
            if (countInPage > 0) { 
                pageMatches.push({page: pages[p].pageNumber, count: countInPage, snippets: snippets}); 
            }
        }
        if (total > 0) { 
            result.matches.push({keyword: keyword, count: total, pages: pageMatches}); 
            result.totalMatches += total; 
        }
    }
    allResults[fileIdx] = result;
    done();
}

function makeErrorResult(file, msg) {
    return {fileName: file.name, fileSize: (file.size/1024).toFixed(2)+' KB',
        totalPages: 0, isScanned: false, ocrFailed: true, errorMsg: msg, matches: [], totalMatches: 0};
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function showResults() {
    document.getElementById('results').classList.remove('hidden');
    var list = document.getElementById('resultsList');
    list.innerHTML = '';
    var withMatches=0, scanned=0, totalMatches=0;

    allResults.forEach(function(r) {
        if (!r) return;
        if (r.totalMatches > 0) withMatches++;
        if (r.isScanned) scanned++;
        totalMatches += r.totalMatches;

        var div = document.createElement('div');
        div.className = 'border border-gray-200 rounded-lg p-5 bg-white';

        var badge, badgeClass;
        if (r.ocrFailed)
            { badge='❌ 解析錯誤'; badgeClass='bg-red-100 text-red-800 border-red-200'; }
        else if (r.isScanned && r.totalMatches===0)
            { badge='🔍 OCR完成（無匹配）'; badgeClass='bg-gray-100 text-gray-600 border-gray-200'; }
        else if (r.isScanned && r.totalMatches>0)
            { badge='🔍 OCR找到 '+r.totalMatches+' 處'; badgeClass='bg-green-100 text-green-800 border-green-200'; }
        else if (r.totalMatches > 0)
            { badge='✅ 找到 '+r.totalMatches+' 處'; badgeClass='bg-green-100 text-green-800 border-green-200'; }
        else
            { badge='— 未找到關鍵字'; badgeClass='bg-gray-100 text-gray-500 border-gray-200'; }

        var typeLabel = r.ocrFailed ? '錯誤' : r.isScanned ? '圖片化/掃描檔 (OCR)' : '電子文字檔';
        var html = '<div class="flex flex-col sm:flex-row justify-between items-start">'
            +'<div class="mb-2 sm:mb-0"><p class="font-bold text-gray-800 text-lg">'+r.fileName+'</p>'
            +'<p class="text-sm text-gray-500 mt-1">大小: '+r.fileSize+' <span class="mx-1">|</span> 頁數: '+r.totalPages+' <span class="mx-1">|</span> 類型: '+typeLabel+'</p></div>'
            +'<span class="px-3 py-1 rounded-full text-sm font-semibold border '+badgeClass+' whitespace-nowrap">'+badge+'</span></div>';

        if (r.ocrFailed) {
            html += '<div class="mt-3 p-3 bg-red-50 border border-red-100 rounded text-sm text-red-600">'+(r.errorMsg||'處理失敗')+'</div>';
        } else if (r.matches.length > 0) {
            html += '<div class="mt-4 space-y-3">';
            r.matches.forEach(function(m) {
                html += '<div class="p-4 bg-gray-50 border border-gray-200 rounded-lg">'
                    +'<div class="flex items-center gap-2 mb-2">'
                    +'<span class="font-bold text-indigo-700 bg-indigo-100 px-2 py-0.5 rounded">關鍵字：'+m.keyword+'</span>'
                    +'<span class="text-sm text-gray-600">共出現 '+m.count+' 次</span>'
                    +'</div>';
                
                m.pages.forEach(function(pg) {
                    html += '<div class="mt-2 text-sm">';
                    html += '<div class="font-semibold text-gray-700 mb-1">第 '+pg.page+' 頁 <span class="text-xs font-normal text-gray-400 ml-1">('+pg.count+'次)</span></div>';
                    html += '<ul class="list-disc pl-5 space-y-1 text-gray-600">';
                    pg.snippets.forEach(function(snip) {
                        html += '<li>...'+snip+'...</li>';
                    });
                    html += '</ul></div>';
                });
                html += '</div>';
            });
            html += '</div>';
        }
        div.innerHTML = html;
        list.appendChild(div);
    });

    document.getElementById('summary').innerHTML =
        '<strong>📊 總結報告：</strong>共掃描 '+allResults.length+' 份文件，'
        +'其中 <strong>'+withMatches+'</strong> 份包含關鍵字。<br>'
        +'(包含 '+scanned+' 份圖片化PDF已轉譯)，'
        +'所有關鍵字共計命中 <strong>'+totalMatches+'</strong> 處。';
}

function showProgress(show) { document.getElementById('progressArea').classList.toggle('hidden', !show); }
function setProgress(pct, label, detail) {
    document.getElementById('progressBar').style.width = pct+'%';
    document.getElementById('progressPct').textContent = pct+'%';
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('progressDetail').textContent = detail;
}

function doExportCSV() {
    var dept = document.getElementById('department').value || '未指定';
    var csv = '\uFEFF所屬單位,檔案名稱,檔案大小,總頁數,檔案類型,關鍵字,關鍵字總次數,頁碼,該頁次數\n';
    allResults.forEach(function(r) {
        if (!r) return;
        var type = r.ocrFailed ? '錯誤' : r.isScanned ? '圖片化/掃描PDF(OCR)' : '電子文字';
        if (r.ocrFailed || r.totalMatches===0) {
            csv += ['"'+dept+'"','"'+r.fileName+'"','"'+r.fileSize+'"',r.totalPages,type,'未找到',0,'N/A',0].join(',')+'\n';
        } else {
            r.matches.forEach(function(m) {
                m.pages.forEach(function(pg) {
                    csv += ['"'+dept+'"','"'+r.fileName+'"','"'+r.fileSize+'"',r.totalPages,type,'"'+m.keyword+'"',m.count,'第'+pg.page+'頁',pg.count].join(',')+'\n';
                });
            });
        }
    });
    download(csv, 'PDF檢查結果_'+dept+'.csv', 'text/csv;charset=utf-8');
}

function doExportTXT() {
    var dept = document.getElementById('department').value || '未指定';
    var txt = 'PDF關鍵字檢查結果\n所屬單位: '+dept+'\n生成時間: '+new Date().toLocaleString('zh-TW')+'\n\n';
    allResults.forEach(function(r) {
        if (!r) return;
        var type = r.ocrFailed ? '錯誤' : r.isScanned ? '圖片化/掃描PDF（OCR）' : '電子文字';
        txt += '【'+r.fileName+'】\n大小: '+r.fileSize+' | 頁數: '+r.totalPages+' | 類型: '+type+'\n';
        if (r.ocrFailed) { txt += '結果: '+(r.errorMsg||'處理失敗')+'\n'; }
        else if (r.totalMatches===0) { txt += '結果: 未找到關鍵字\n'; }
        else {
            txt += '匹配: '+r.totalMatches+' 處\n';
            r.matches.forEach(function(m) {
                txt += '  "'+m.keyword+'" - '+m.count+' 次:\n';
                m.pages.forEach(function(pg){ 
                    txt += '    第 '+pg.page+' 頁 ('+pg.count+'次):\n'; 
                    pg.snippets.forEach(function(snip) {
                        // 移除 HTML 標籤後匯出
                        var cleanSnip = snip.replace(/<[^>]*>?/gm, '');
                        txt += '      > ...' + cleanSnip + '...\n';
                    });
                });
                txt += '\n';
            });
        }
        txt += '---\n';
    });
    download(txt, 'PDF檢查結果_'+dept+'.txt', 'text/plain;charset=utf-8');
}

function download(content, filename, type) {
    var blob = new Blob([content], {type: type});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);}, 100);
}
</script>
