<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>舞台看板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f8fc;--surface:#ffffff;--surface2:#f1f3f9;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1d2e;--muted:#6b7280;
  --accent:#1a73e8;--accent-dim:rgba(26,115,232,0.08);
  --green:#16a34a;--green-dim:rgba(22,163,74,0.08);
  --amber:#d97706;--amber-dim:rgba(217,119,6,0.08);
  --red:#dc2626;--radius:12px;--radius-sm:7px;
}

/* 🪐 核心鎖定：停用整頁外層滾動軸 */
html, body {
  height: 100%;
  overflow: hidden;
}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--text);
  display: flex;
  flex-direction: column;
}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink: 0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.logo{font-size:14px;font-weight:700;}
.live{display:flex;align-items:center;gap:5px;background:var(--green-dim);border:1px solid rgba(22,163,74,.3);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--green);letter-spacing:.04em;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:p 1.2s ease-in-out infinite;}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.nav-links{display:flex;gap:3px;}
.nav-link{padding:5px 11px;border-radius:var(--radius-sm);font-size:12px;color:var(--muted);text-decoration:none;}
.nav-link:hover{background:var(--surface2);}
.nav-link.active{background:var(--green-dim);color:var(--green);}

.main{
  flex: 1;
  max-width: 1600px; /* 擴大看盤視野以容納三欄 */
  width: 100%;
  margin: 0 auto;
  padding: 14px 16px 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.ev-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;flex-shrink: 0;}
.ev-name{font-size:22px;font-weight:900;line-height:1.2;}
.ev-meta{font-size:13px;color:var(--muted);margin-top:3px;}
.clock{text-align:right;}
.clock-time{font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--accent);line-height: 1;}
.clock-date{font-size:12px;color:var(--muted);margin-top:4px;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:12px;flex-shrink: 0;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 15px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.stat-num{font-size:28px;font-weight:900;line-height:1;}
.stat-bar{height:3px;background:var(--border2);border-radius:99px;margin-top:7px;overflow:hidden;}
.stat-fill{height:100%;border-radius:99px;background:var(--green);transition:width .6s ease;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.04em;}

/* 🪐 電腦版佈局：完美分配成「左、中、右」三欄 */
.grid{
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1.2fr 320px; 
  gap: 14px;
  min-height: 0; 
}

/* 手機版專用三頁籤（電腦版自動隱藏） */
.mobile-tabs {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.03);
}
.m-tab-btn {
  flex: 1;
  padding: 11px 5px;
  background: none;
  border: none;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  transition: all 0.2s;
}
.m-tab-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.ph{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink: 0;}
.ph-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

/* 🪐 各區獨立滾動軸設定 */
.feed{ flex: 1; padding: 10px; overflow-y: auto; }

/* 🪑 座位區專用美化排版 */
.seats-body {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
  gap: 10px;
  align-content: start;
}
.table-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.table-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  border-bottom: 1px solid var(--border2);
  padding-bottom: 4px;
  text-align: center;
}
.table-guests {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: center;
}
.seat-chip {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 500;
  display: inline-block;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.seat-occupied { background: var(--green-dim); color: var(--green); border: 1px solid rgba(22,163,74,0.2); font-weight: 700; }
.seat-vacant { background: var(--surface); color: var(--muted); border: 1px solid var(--border); opacity: 0.6; }

.acard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:13px;}
.acard.fresh{border-color:rgba(22,163,74,.4);animation:si .35s ease;}
@keyframes si{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
.acard.vip{border-left:3px solid var(--amber);}
.aa{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
.ai{flex:1;min-width:0;}
.aname{font-size:14px;font-weight:700;}
.atitle{font-size:12px;color:var(--muted);margin-top:1px;}
.anote{font-size:11px;color:var(--amber);margin-top:2px;}
.am{text-align:right;flex-shrink:0;}
.atime{font-size:20px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;}
.albl{font-size:10px;color:var(--muted);margin-top:2px;}
.badge{display:inline-flex;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.bvip{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(217,119,6,.2);}
.bnew{background:var(--green-dim);color:var(--green);border:1px solid rgba(22,163,74,.2);}
.empty{text-align:center;padding:44px 18px;color:var(--muted);font-size:14px;}
.vip-photo{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border2);}
.priority-leaving{opacity:.55;transition:opacity 5s ease;border-left-color:var(--muted)!important;}
.priority-leaving .aname::after{content:' → 移至一般貴賓';font-size:10px;color:var(--muted);font-weight:400;margin-left:6px;}
.pavatar-photo{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid var(--border2);}

.side{ display:flex; flex-direction:column; gap:13px; min-width:0; height: 100%; }
.side .panel:nth-child(1) { flex: 1.2; } 
.side .panel:nth-child(2) { flex: 1; }   
#pending { flex: 1; overflow-y: auto; }

.pitem{display:flex;align-items:center;gap:9px;padding:8px 14px;border-bottom:1px solid var(--border);}
.pitem:last-child{border-bottom:none;}
.pavatar{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.pinfo{flex:1;}
.pname{font-size:13px;font-weight:500;}
.ptitle{font-size:11px;color:var(--muted);}
.dotw{width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;}

.notes-body{ padding:10px 13px; display: flex; flex-direction: column; flex: 1; min-height: 0; }
#notes-list { flex: 1; overflow-y: auto; margin-bottom: 8px; }
.note{background:var(--surface2);border-radius:6px;padding:7px 9px;margin-bottom:6px;font-size:13px;border-left:3px solid var(--accent);}
.note-meta{font-size:10px;color:var(--muted);margin-top:2px;}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:7px 10px;font-size:12px;font-family:inherit;resize:none;flex-shrink: 0;}
textarea:focus{outline:none;border-color:var(--accent);}
.btnsend{width:100%;margin-top:7px;padding:7px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);background:var(--accent-dim);border:1px solid rgba(26,115,232,.25);color:var(--accent);cursor:pointer;flex-shrink: 0;}

.statusbar{background:var(--surface);border-top:1px solid var(--border);padding:9px 22px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);flex-shrink: 0;}
.conn-ok{color:var(--green);}
.conn-err{color:var(--red);}
.error-banner{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:var(--radius);padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;flex-shrink: 0;}

/* ════════════════════════════════
   📱 手機與平板自適應平板（≤ 960px）
════════════════════════════════ */
@media (max-width: 960px) {
  .topbar { padding: 0 12px; height: 48px; }
  .logo { font-size: 13px; }
  .main { padding: 10px 10px 6px; }
  .ev-header { margin-bottom: 8px; }
  .ev-name { font-size: 16px; }
  .clock-time { font-size: 18px; }
  
  .stats { gap: 5px; margin-bottom: 10px; }
  .stat { padding: 6px 4px; text-align: center; }
  .stat-num { font-size: 18px; }
  .stat-lbl { font-size: 8px; scale: 0.9; margin-top: 1px; white-space: nowrap; }
  .stat-bar { display: none; } 

  /* 🪐 手機版切換邏輯：預設顯示動態，隱藏其他兩者，達成零滾軸 */
  .mobile-tabs { display: flex; }
  .grid { display: block !important; height: 100%; }
  .feed-panel, .seats-panel, .side { display: none; height: 100%; }
  
  .grid.show-feed .feed-panel { display: flex !important; }
  .grid.show-seats .seats-panel { display: flex !important; }
  .grid.show-side .side { display: flex !important; }

  .acard { padding: 8px 10px; gap: 8px; margin-bottom: 5px; }
  .aa, .vip-photo { width: 34px; height: 34px; font-size: 13px; }
  .aname { font-size: 13px; }
  .atime { font-size: 16px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🎤 舞台看板</div>
  <div class="live"><div class="dot"></div>LIVE</div>
  <div class="nav-links">
    <a href="00-setup.html" class="nav-link">⚙ 設定</a>
    <a href="01-checkin.html" class="nav-link">📋 報到區</a>
    <a href="02-stage.html" class="nav-link active">🎤 舞台看板</a>
  </div>
</div>

<div class="main">
  <div id="err-banner" class="error-banner"></div>

  <div class="ev-header">
    <div>
      <div class="ev-name" id="ev-name">載入中...</div>
      <div class="ev-meta" id="ev-meta"></div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clock-time">--:--:--</div>
      <div class="clock-date" id="clock-date"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="st-total" style="color:var(--accent)">—</div><div class="stat-lbl">受邀貴賓</div></div>
    <div class="stat">
      <div class="stat-num" id="st-done" style="color:var(--green)">0</div>
      <div class="stat-bar"><div class="stat-fill" id="bar" style="width:0%"></div></div>
      <div class="stat-lbl">已到場</div>
    </div>
    <div class="stat"><div class="stat-num" id="st-pend" style="color:var(--amber)">—</div><div class="stat-lbl">待到場</div></div>
    <div class="stat"><div class="stat-num" id="st-pct" style="color:var(--muted)">0%</div><div class="stat-lbl">到場率</div></div>
  </div>

  <!-- 手機版切換三頁籤 -->
  <div class="mobile-tabs">
    <button id="m-tab-feed" class="m-tab-btn active" onclick="switchMobileTab('feed')">⚡ 即時動態</button>
    <button id="m-tab-seats" class="m-tab-btn" onclick="switchMobileTab('seats')">🪑 座位區</button>
    <button id="m-tab-side" class="m-tab-btn" onclick="switchMobileTab('side')">📋 名單/備註</button>
  </div>

  <!-- 預設啟動 show-feed 狀態 -->
  <div class="grid show-feed">
    <!-- 欄位一：即時動態 -->
    <div class="panel feed-panel">
      <div class="ph"><div class="dot"></div><span class="ph-title">即時到場動態</span></div>
      <div class="feed" id="feed"><div class="empty">等待報到區回傳...</div></div>
    </div>
    
    <!-- 欄位二：座位區（全新回歸！） -->
    <div class="panel seats-panel">
      <div class="ph"><span class="ph-title">🪑 座位區配置狀態</span></div>
      <div class="seats-body" id="seats-container">
        <div class="empty">載入座位資料中...</div>
      </div>
    </div>
    
    <!-- 欄位三：待到場與備註 -->
    <div class="side">
      <div class="panel">
        <div class="ph"><span class="ph-title">待到場名單</span></div>
        <div id="pending"></div>
      </div>
      <div class="panel">
        <div class="ph"><span class="ph-title">備註 / 通訊</span></div>
        <div class="notes-body">
          <div id="notes-list"><div style="color:var(--muted);font-size:12px;">尚無備註</div></div>
          <textarea id="stage-note" rows="2" placeholder="傳送備註給報到區..."></textarea>
          <button class="btnsend" onclick="sendNote()">📤 傳送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="conn" class="conn-ok">● 輪詢同步中（每 5 秒）</span>
  <span id="last-upd"></span>
</div>

<script>
const HARDCODED_API_URL = 'https://script.google.com/macros/s/AKfycbw0_bNl1sJB_ARNjMqKWUGfWERaXoo5W-H1X6W3Q-TYVcO7fLQ7p48z9rvLA5j1dshVnA/exec';

const KEY = 'vip_gs_config';
const COLORS = ['#4f8fff','#2ecc8a','#a78bfa','#f97316','#ec4899','#14b8a6'];
let vips = {}, vipOrder = [], colorMap = {}, apiUrl = '', prevChecked = new Set();

// 🪐 手機版三頁籤一切即換
function switchMobileTab(target) {
  const grid = document.querySelector('.grid');
  const tabs = ['feed', 'seats', 'side'];
  
  tabs.forEach(t => {
    const btn = document.getElementById(`m-tab-${t}`);
    if (t === target) {
      grid.classList.add(`show-${t}`);
      if (btn) btn.classList.add('active');
    } else {
      grid.classList.remove(`show-${t}`);
      if (btn) btn.classList.remove('active');
    }
  });
}

function init() {
  apiUrl = HARDCODED_API_URL || (stored().apiUrl || '');
  if (!apiUrl) {
    showErr('請將 Apps Script 網址填入 HARDCODED_API_URL 或前往設定頁儲存。');
    return;
  }
  loadAll();
}

async function loadAll() {
  vips = {};
  try {
    const res = await fetch(apiUrl + '?action=all&t=' + Date.now());
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    updateHeader(data.eventInfo);
    vipOrder = data.vips.map(v => String(v.id));
    data.vips.forEach((v, i) => {
      v.id    = String(v.id    ?? '');
      v.name  = String(v.name  ?? '');
      v.title = String(v.title ?? '');
      v.note  = String(v.note  ?? '');
      v.photo = String(v.photo ?? '');
      v.seat  = String(v.seat  ?? v.table ?? ''); // 自動相容 seat 或 table 欄位
      vips[v.id] = v;
      colorMap[v.id] = COLORS[i % COLORS.length];
    });
    prevChecked = new Set(data.vips.filter(v=>v.checked).map(v=>String(v.id)));
    renderFeed();
    renderSeats();
    renderPending();
    updateStats();
    renderNotes(data.notes);
    setConn(true);
  } catch(e) {
    showErr('載入失敗：' + e.message);
    setConn(false);
  }
  setInterval(poll, 5000);
}

async function poll() {
  try {
    const res = await fetch(apiUrl + '?action=poll&t=' + Date.now());
    const data = await res.json();
    if (data.error) return;
    const incomingIds = new Set(Object.keys(data.checkins));
    const localIds    = new Set(Object.keys(vips));
    const hasNew      = [...incomingIds].some(id => !localIds.has(id));
    if (hasNew) { await loadAll(); return; }
    let deleted = false;
    [...localIds].forEach(id => {
      if (!incomingIds.has(id)) {
        delete vips[id];
        vipOrder = vipOrder.filter(x => x !== id);
        deleted = true;
      }
    });
    const newChecked = new Set();
    let changed = false;
    const priorityDowngrades = [];
    Object.entries(data.checkins).forEach(([id, info]) => {
      if (info.checked) newChecked.add(id);
      if (!vips[id]) return;
      const oldPriority = vips[id].priority;
      const newPriority = String(info.priority || 'normal');
      const incomingSeat = String(info.seat || info.table || '');
      if (vips[id].checked  !== info.checked  ||
          vips[id].time     !== info.time      ||
          vips[id].note     !== info.note      ||
          vips[id].name     !== info.name      ||
          vips[id].title    !== info.title     ||
          vips[id].seat     !== incomingSeat   ||
          oldPriority       !== newPriority    ||
          vips[id].photo    !== info.photo) {
        vips[id].checked  = info.checked;
        vips[id].time     = info.time;
        vips[id].note     = info.note;
        vips[id].name     = String(info.name  || vips[id].name  || '');
        vips[id].title    = String(info.title || vips[id].title || '');
        vips[id].priority = newPriority;
        vips[id].seat     = incomingSeat;
        vips[id].photo    = info.photo !== undefined ? info.photo : vips[id].photo;
        if (oldPriority !== newPriority && newPriority === 'normal') {
          priorityDowngrades.push(id);
        }
        changed = true;
      }
    });
    if (deleted) changed = true;
    const justArrived = [...newChecked].filter(id => !prevChecked.has(id));
    prevChecked = newChecked;
    if (changed) {
      if (priorityDowngrades.length > 0) {
        priorityDowngrades.forEach(id => { if (vips[id]) vips[id]._pendingNormal = true; });
        renderFeed(justArrived); renderSeats(); renderPending(); updateStats();
        setTimeout(() => {
          priorityDowngrades.forEach(id => { if (vips[id]) delete vips[id]._pendingNormal; });
          renderFeed([]); renderSeats(); renderPending(); updateStats();
        }, 5000);
      } else {
        renderFeed(justArrived); renderSeats(); renderPending(); updateStats();
      }
    }
    renderNotes(data.notes);
    setConn(true);
    setUpd();
  } catch(e) { setConn(false); }
}

function renderFeed(justArrived = []) {
  const arrived = vipOrder.map(id => vips[id]).filter(v => v && v.checked);
  const el = document.getElementById('feed');
  if (!arrived.length) { el.innerHTML = '<div class="empty">等待報到區回傳...</div>'; return; }
  el.innerHTML = arrived.slice(0,20).map(v => {
    const c = colorMap[v.id] || '#4f8fff';
    const isNew = justArrived.includes(String(v.id));
    const isLeaving = !!v._pendingNormal;
    const photoHtml = v.photo
      ? `<img src="${v.photo}" class="vip-photo" alt="${v.name}" onerror="this.style.display='none'">`
      : `<div class="aa" style="background:${c}22;color:${c}">${v.name.charAt(0)}</div>`;
    const effectiveVip = isLeaving || v.priority === 'vip';
    return `<div class="acard ${isNew?'fresh':''} ${effectiveVip?'vip':''} ${isLeaving?'priority-leaving':''}">
      ${photoHtml}
      <div class="ai">
        <div class="aname">${v.name} ${v.priority==='vip'?'<span class="badge bvip">★ 主要</span>':''} ${isNew?'<span class="badge bnew">剛到</span>':''}</div>
        <div class="atitle">${v.title} ${v.seat?` | 🪑 ${v.seat}`:''}</div>
        ${v.note?`<div class="anote">📌 ${v.note}</div>`:''}
      </div>
      <div class="am"><div class="atime">${v.time}</div><div class="albl">報到時間</div></div>
    </div>`;
  }).join('');
}

// 🪐 渲染座位區的核心邏輯（自動依桌號/座位分組並顯示狀態）
function renderSeats() {
  const el = document.getElementById('seats-container');
  const tables = {};
  
  Object.values(vips).forEach(v => {
    const t = v.seat ? v.seat.trim() : '未配置座位';
    if (!tables[t]) tables[t] = [];
    tables[t].push(v);
  });
  
  const tableKeys = Object.keys(tables).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN', {numeric: true}));
  if (tableKeys.length === 0 || (tableKeys.length === 1 && tableKeys[0] === '未配置座位' && tables['未配置座位'].length === 0)) {
    el.innerHTML = '<div class="empty">目前無座位配置資料</div>';
    return;
  }
  
  el.innerHTML = tableKeys.map(tName => {
    const guests = tables[tName];
    const guestChips = guests.map(g => {
      const statusClass = g.checked ? 'seat-occupied' : 'seat-vacant';
      return `<span class="seat-chip ${statusClass}" title="${g.name} (${g.title})">${g.name}</span>`;
    }).join('');
    
    return `<div class="table-box">
      <div class="table-title">${tName}</div>
      <div class="table-guests">${guestChips}</div>
    </div>`;
  }).join('');
}

function renderPending() {
  const pend = Object.values(vips).filter(v => !v.checked);
  const el = document.getElementById('pending');
  if (!pend.length) { el.innerHTML = '<div style="padding:12px 14px;color:var(--green);font-size:13px;text-align:center;">✓ 全員到齊</div>'; return; }
  el.innerHTML = pend.map(v => {
    const c = colorMap[v.id] || '#1a73e8';
    const thumbHtml = v.photo
      ? `<img src="${v.photo}" class="pavatar-photo" alt="${v.name}" onerror="this.outerHTML='<div class=\'pavatar\' style=\'background:${c}22;color:${c}\\'>${v.name.charAt(0)}</div>'">`
      : `<div class="pavatar" style="background:${c}22;color:${c}">${v.name.charAt(0)}</div>`;
    return `<div class="pitem">
      ${thumbHtml}
      <div class="pinfo"><div class="pname">${v.name} ${v.seat?`<span style="color:var(--amber);font-size:11px;margin-left:5px;">(${v.seat})</span>`:''}</div><div class="ptitle">${v.title}</div></div>
      <div class="dotw"></div>
    </div>`;
  }).join('');
}

function updateStats() {
  const all = Object.values(vips);
  const done = all.filter(v=>v.checked).length;
  const pct = all.length ? Math.round(done/all.length*100) : 0;
  document.getElementById('st-total').textContent = all.length;
  document.getElementById('st-done').textContent = done;
  document.getElementById('st-pend').textContent = all.length - done;
  document.getElementById('st-pct').textContent = pct + '%';
  document.getElementById('bar').style.width = pct + '%';
}

function renderNotes(notes) {
  const el = document.getElementById('notes-list');
  if (!notes || !notes.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;">尚無備註</div>'; return; }
  el.innerHTML = notes.map(n => {
    const fromColor = n.from === '貴賓備註' ? '#d97706' : n.from === '舞台區' ? '#7c3aed' : '#1a73e8';
    return `<div class="note"><span style="font-size:11px;font-weight:600;color:${fromColor};margin-right:6px;">[${n.from}]</span>${n.text}<div class="note-meta">${n.time||''}</div></div>`;
  }).join('');
}

async function sendNote() {
  const text = document.getElementById('stage-note').value.trim();
  if (!text || !apiUrl) return;
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  try {
    await fetch(apiUrl + '?action=note&text=' + encodeURIComponent(text) + '&from=' + encodeURIComponent('舞台區') + '&time=' + encodeURIComponent(time));
    document.getElementById('stage-note').value = '';
  } catch(e) {}
}

function updateHeader(info) {
  if (!info) return;
  document.getElementById('ev-name').textContent = info['活動名稱'] || '活動';
  const rawParts = [info['日期'], info['地點'], info['時間']].filter(Boolean);
  const parts = rawParts.map(p => String(p).replace(/-/g, '/'));
  document.getElementById('ev-meta').textContent = parts.join(' · ');
}

function showErr(msg) { const el=document.getElementById('err-banner'); el.innerHTML='⚠ '+msg; el.style.display='block'; }
function setConn(ok) {
  const el=document.getElementById('conn');
  el.textContent = ok ? '● 輪詢同步中（每 5 秒）' : '● 連線中斷';
  el.className = ok ? 'conn-ok' : 'conn-err';
}
function setUpd() {
  const n=new Date();
  document.getElementById('last-upd').textContent =
    `上次同步 ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}
function stored() { try { return JSON.parse(localStorage.getItem(KEY))||{}; } catch(e) { return {}; } }

setInterval(() => {
  const n=new Date();
  document.getElementById('clock-time').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
  const days=['日','一','二','三','四','五','六'];
  document.getElementById('clock-date').textContent=`${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')} (${days[n.getDay()]})`;
},1000);

init();
</script>
</body>
