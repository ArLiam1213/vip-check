<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>舞台看板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{\n  --bg:#f7f8fc;--surface:#ffffff;--surface2:#f1f3f9;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1d2e;--muted:#6b7280;
  --accent:#1a73e8;--accent-dim:rgba(26,115,232,0.08);
  --green:#16a34a;--green-dim:rgba(22,163,74,0.08);
  --amber:#d97706;--amber-dim:rgba(217,119,6,0.08);
  --red:#dc2626;--radius:12px;--radius-sm:7px;
}

html { scroll-behavior: smooth; }
body {
  font-family:'Noto Sans TC', sans-serif; background:var(--bg); color:var(--text);
  overflow:hidden; height:100vh; display:flex; flex-direction:column;
}

header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:14px 24px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
}
.brand { display:flex; align-items:center; gap:12px; }
.logo-icon {
  width:36px; height:36px; background:linear-gradient(135deg, var(--accent), #4f8fff);
  border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:18px;
}
.brand-text h1 { font-size:18px; font-weight:700; color:var(--text); line-height:1.2; }
.brand-text p { font-size:12px; color:var(--muted); }

.center-meta { text-align:center; flex:1; max-width:50%; }
#ev-name { font-size:20px; font-weight:900; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#ev-meta { font-size:13px; color:var(--muted); margin-top:2px; }

.right-status { display:flex; align-items:center; gap:20px; text-align:right; }
.clock { font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--text); letter-spacing:0.5px; }
.indicator-group { display:flex; flex-direction:column; gap:2px; font-size:11px; }
#conn { font-weight:700; }
.conn-ok { color:var(--green); }
.conn-err { color:var(--red); animation:blink 1s infinite alternate; }
#last-upd { color:var(--muted); }

#err-banner {
  background:var(--red); color:#fff; padding:8px 24px; font-size:14px; font-weight:500;
  text-align:center; display:none; flex-shrink:0;
}

.main-container { display:flex; flex:1; overflow:hidden; }

/* 左側：大字跳出輪播 */
.left-panel {
  flex:1.3; background:linear-gradient(135deg, #1e293b, #0f172a);
  position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;
}
.welcome-box {
  width:90%; max-width:720px; text-align:center; color:#fff;
  display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:450px;
}
.w-photo-wrap {
  width:160px; height:160px; border-radius:50%; border:6px solid rgba(255,255,255,0.15);
  margin-bottom:24px; overflow:hidden; background:rgba(255,255,255,0.05);
  display:none; align-items:center; justify-content:center;
}
.w-photo { width:100%; height:100%; object-fit:cover; }
.w-avatar {
  width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.1);
  font-size:72px; font-weight:700; color:#fff; display:flex; align-items:center; justify-content:center; margin-bottom:24px;
}
.w-lbl {
  font-size:20px; font-weight:700; text-transform:uppercase; letter-spacing:4px;
  color:#38bdf8; margin-bottom:12px; background:rgba(56,189,248,0.1); padding:4px 16px; border-radius:30px;
}
.w-name { font-size:64px; font-weight:900; line-height:1.1; margin-bottom:12px; letter-spacing:1px; word-break:break-all; }
.w-title { font-size:26px; color:#cbd5e1; font-weight:500; max-width:90%; line-height:1.4; }

/* 右側：動態清單 */
.right-panel {
  flex:1; background:var(--bg); border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.panel-hdr {
  background:var(--surface); padding:16px 20px; border-bottom:1px solid var(--border);
  display:flex; justify-content:between; align-items:center; flex-shrink:0;
}
.panel-title { font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
.panel-title::before {
  content:''; width:4px; height:16px; background:var(--accent); border-radius:2px;
}
.counter-pill {
  margin-left:auto; background:var(--accent-dim); color:var(--accent);
  padding:4px 12px; border-radius:20px; font-size:13px; font-weight:700;
}

.feed-container { flex:1; overflow-y:auto; padding:16px; }
#feed { display:flex; flex-direction:column; gap:12px; }

.empty { text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }

/* 卡片設計 */
.acard {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; display:flex; align-items:center; gap:14px;
  position:relative; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.vip-photo {
  width:46px; height:46px; border-radius:50%; object-fit:cover; border:1px solid var(--border2); flex-shrink:0;
}
.aa {
  width:46px; height:46px; border-radius:50%; font-size:18px; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.ai { flex:1; min-width:0; }
.aname { font-size:16px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:6px; }
.atitle { font-size:13px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.anote { font-size:12px; color:var(--amber); font-weight:500; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.am { text-align:right; flex-shrink:0; }
.atime { font-size:15px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; }
.albl { font-size:11px; color:var(--muted); margin-top:1px; }

/* 特殊卡片樣式 */
.acard.vip { border-left:5px solid var(--amber); background:linear-gradient(to right, rgba(217,119,6,0.02), #fff); }
.acard.priority-leaving { border-left:5px solid var(--red) !important; background:linear-gradient(to right, rgba(220,38,38,0.02), #fff) !important; }

.badge { font-size:10px; padding:1px 6px; border-radius:4px; font-weight:700; }
.bvip { background:var(--amber-dim); color:var(--amber); }
.bnew { background:var(--green); color:#fff; animation:flash 1s infinite alternate; }

/* 動畫效果 */
.acard.fresh { animation:slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; background:lightyellow; }
@keyframes slideIn { from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:translateY(0); } }
@keyframes flash { from{opacity:0.6;} to{opacity:1;} }
@keyframes blink { from{opacity:0.4;} to{opacity:1;} }

.fade-in-out { animation: fadeInOut 4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
@keyframes fadeInOut {
  0% { opacity:0; transform:scale(0.95) translateY(10px); }
  8% { opacity:1; transform:scale(1) translateY(0); }
  92% { opacity:1; transform:scale(1) translateY(0); }
  100% { opacity:0; transform:scale(0.98) translateY(-10px); }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo-icon">V</div>
    <div class="brand-text">
      <h1>貴賓到場動態</h1>
      <p>舞台端即時看板</p>
    </div>
  </div>
  <div class="center-meta">
    <div id="ev-name">載入中...</div>
    <div id="ev-meta">請稍候</div>
  </div>
  <div class="right-status">
    <div class="clock" id="clock-time">00:00:00</div>
    <div class="indicator-group">
      <span id="conn" class="conn-err">● 連線中斷</span>
      <span id="last-upd">尚未同步</span>
    </div>
  </div>
</header>

<div id="err-banner"></div>

<div class="main-container">
  <div class="left-panel">
    <div class="welcome-box" id="welcome-box" style="display:none;">
      <div class="w-photo-wrap" id="w-photo-wrap"><img src="" class="w-photo" id="w-photo"></div>
      <div class="w-avatar" id="w-avatar"></div>
      <div class="w-lbl" id="w-lbl">WELCOME</div>
      <div class="w-name" id="w-name"></div>
      <div class="w-title" id="w-title"></div>
    </div>
  </div>
  
  <div class="right-panel">
    <div class="panel-hdr">
      <div class="panel-title">即時到場動態</div>
      <div class="counter-pill" id="counter">已到場 0 人</div>
    </div>
    <div class="feed-container">
      <div id="feed">
        <div class="empty">等待報到區回傳...</div>
      </div>
    </div>
  </div>
</div>

<script>
// 請替換成您的 Google Apps Script 網頁應用程式 URL
const apiUrl = 'https://script.google.com/macros/s/AKfycby9O2Mh_b0H0_3jAEvk41Hj-b0jWk5x4O0U_Z7XwZfO9QnJ9XpXFvVvW8N_1zX_1zX_/exec';
const KEY = 'stage_dashboard_data';

let vips = {};
let vipOrder = [];
let colorMap = {};
let queue = [];
let isLooping = false;

function init() {
  const local = stored();
  if (local.vips) {
    vips = local.vips;
    vipOrder = local.vipOrder || Object.keys(vips);
    buildColors();
    renderFeed();
    updateCounter();
  }
  if (local.info) renderInfo(local.info);
  poll();
  setInterval(poll, 5000);
}

function buildColors() {
  const palette = ['#1a73e8','#16a34a','#d97706','#7c3aed','#db2777','#059669','#ea580c'];
  vipOrder.forEach((id, idx) => {
    if (!colorMap[id]) colorMap[id] = palette[idx % palette.length];
  });
}

async function poll() {
  try {
    const res = await fetch(apiUrl + '?action=poll&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP 錯誤 ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    
    setConn(true);
    document.getElementById('err-banner').style.display = 'none';
    
    if (data.eventInfo) renderInfo(data.eventInfo);
    
    let hasChanges = false;
    let freshArrived = [];
    
    if (data.vips) {
      const old = vips;
      vips = data.vips;
      vipOrder = data.vipOrder || Object.keys(vips);
      buildColors();
      
      // 比對是否有新報到的人
      for (const id in vips) {
        if (vips[id].checked && (!old[id] || !old[id].checked)) {
          freshArrived.push(id);
          queue.push(id); // 放進大字輪播佇列
          hasChanges = true;
        } else if (old[id] && old[id].checked && !vips[id].checked) {
          // 被撤銷報到
          hasChanges = true;
        } else if (old[id] && JSON.stringify(old[id]) !== JSON.stringify(vips[id])) {
          // 資料有修改
          hasChanges = true;
        }
      }
      
      localStorage.setItem(KEY, JSON.stringify({ vips, vipOrder, info: data.eventInfo }));
    }
    
    if (hasChanges || document.querySelectorAll('.acard').length === 0) {
      renderFeed(freshArrived);
      updateCounter();
    }
    
    if (queue.length > 0 && !isLooping) {
      triggerNextWelcome();
    }
    
    setUpd();
  } catch(e) {
    console.error(e);
    setConn(false);
    showErr(e.message);
  }
}

// ── 關鍵修改：依據報到時序排列，越晚來的在越上方 ────────────────
function renderFeed(justArrived = []) {
  // 1. 取得所有已報到的貴賓資料
  const arrived = vipOrder.map(id => vips[id]).filter(v => v && v.checked);
  const el = document.getElementById('feed');
  if (!arrived.length) { el.innerHTML = '<div class="empty">等待報到區回傳...</div>'; return; }
  
  // 2. 排序邏輯：依據報到時間 (v.time) 進行降序排列 (時間大、晚來的排前面)
  arrived.sort((a, b) => {
    const timeA = String(a.time || '');
    const timeB = String(b.time || '');
    return timeB.localeCompare(timeA);
  });

  // 3. 渲染排序後的結果（最多顯示 20 筆）
  el.innerHTML = arrived.slice(0, 20).map(v => {
    v.name  = String(v.name  || '');
    v.title = String(v.title || '');
    const c = colorMap[v.id] || '#4f8fff';
    const isNew = justArrived.includes(String(v.id));
    const isLeaving = !!v._pendingNormal;
    const photoHtml = v.photo
      ? `<img src="${v.photo}" class="vip-photo" alt="${v.name}" onerror="this.style.display='none'">`
      : `<div class="aa" style="background:${c}22;color:${c}">${v.name.charAt(0)}</div>`;
    const effectiveVip = isLeaving || v.priority === 'vip';
    return `<div class="acard ${isNew?'fresh':''} ${effectiveVip?'vip':''} ${isLeaving?'priority-leaving':''}">
      ${photoHtml}
      <div class="ai">
        <div class="aname">${v.name} ${v.priority==='vip'?'<span class="badge bvip">★ 主要</span>':''} ${isNew?'<span class="badge bnew">剛到</span>':''}</div>
        <div class="atitle">${v.title}</div>
        ${v.note?`<div class="anote">📌 ${v.note}</div>`:''}
      </div>
      <div class="am"><div class="atime">${v.time}</div><div class="albl">報到時間</div></div>
    </div>`;
  }).join('');
}

function updateCounter() {
  const done = Object.values(vips).filter(v => v.checked).length;
  document.getElementById('counter').textContent = `已到場 ${done} 人`;
}

function triggerNextWelcome() {
  if (queue.length === 0) { isLooping = false; return; }
  isLooping = true;
  const id = queue.shift();
  const v = vips[id];
  if (!v) { triggerNextWelcome(); return; }
  
  const box = document.getElementById('welcome-box');
  const imgWrap = document.getElementById('w-photo-wrap');
  const img = document.getElementById('w-photo');
  const avatar = document.getElementById('w-avatar');
  const lbl = document.getElementById('w-lbl');
  const nameEl = document.getElementById('w-name');
  const titleEl = document.getElementById('w-title');
  
  // 複製節點重置動畫
  const newBox = box.cloneNode(true);
  box.parentNode.replaceChild(newBox, box);
  
  const targetImgWrap = newBox.querySelector('#w-photo-wrap');
  const targetImg = newBox.querySelector('#w-photo');
  const targetAvatar = newBox.querySelector('#w-avatar');
  const targetLbl = newBox.querySelector('#w-lbl');
  const targetName = newBox.querySelector('#w-name');
  const targetTitle = newBox.querySelector('#w-title');
  
  targetName.textContent = v.name || '';
  targetTitle.textContent = v.title || '';
  
  if (v.priority === 'vip') {
    targetLbl.textContent = '主要貴賓蒞臨';
    targetLbl.style.background = 'rgba(217,119,6,0.2)';
    targetLbl.style.color = '#fbbf24';
  } else {
    targetLbl.textContent = '貴賓蒞臨';
    targetLbl.style.background = 'rgba(56,189,248,0.1)';
    targetLbl.style.color = '#38bdf8';
  }
  
  if (v.photo) {
    targetImg.src = v.photo;
    targetImgWrap.style.display = 'flex';
    targetAvatar.style.display = 'none';
    targetImg.onerror = () => {
      targetImgWrap.style.display = 'none';
      targetAvatar.style.display = 'flex';
    };
  } else {
    targetImgWrap.style.display = 'none';
    targetAvatar.style.display = 'flex';
  }
  
  const c = colorMap[id] || '#4f8fff';
  targetAvatar.style.background = c;
  targetAvatar.textContent = (v.name || '').charAt(0);
  
  newBox.style.display = 'flex';
  newBox.className = 'welcome-box fade-in-out';
  
  setTimeout(() => {
    newBox.style.display = 'none';
    triggerNextWelcome();
  }, 4000);
}

function renderInfo(info) {
  document.getElementById('ev-name').textContent = info['活動名稱'] || '活動';
  const rawParts = [info['日期'], info['地點'], info['時間']].filter(Boolean);
  const parts = rawParts.map(p => {
    const s = String(p);
    const dateOnly = s.includes('T') ? s.split('T')[0] : s;
    return dateOnly.replace(/-/g, '/');
  });
  document.getElementById('ev-meta').textContent = parts.join(' · ');
}

function showErr(msg) { const el=document.getElementById('err-banner'); el.innerHTML='⚠ '+msg; el.style.display='block'; }
function setConn(ok) {
  const el=document.getElementById('conn');
  el.textContent = ok ? '● 輪詢同步中（每 5 秒）' : '● 連線中斷';
  el.className = ok ? 'conn-ok' : 'conn-err';
}
function setUpd() {
  const n=new Date();
  document.getElementById('last-upd').textContent =
    `上次同步 ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}
function stored() { try { return JSON.parse(localStorage.getItem(KEY))||{}; } catch(e) { return {}; } }

setInterval(() => {
  const n=new Date();
  document.getElementById('clock-time').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}, 1000);

window.onload = init;
</script>
</body>
</html>
