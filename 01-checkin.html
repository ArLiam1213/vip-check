<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>報到區 — 工作人員</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f8fc;--surface:#fff;--surface2:#f1f3f9;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1d2e;--muted:#6b7280;
  --accent:#1a73e8;--accent-dim:rgba(26,115,232,0.08);
  --green:#16a34a;--green-dim:rgba(22,163,74,0.08);
  --amber:#d97706;--red:#dc2626;--radius:10px;--radius-sm:6px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.logo{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.65)}}
.nav-links{display:flex;gap:3px;}
.nav-link{padding:5px 11px;border-radius:var(--radius-sm);font-size:12px;color:var(--muted);text-decoration:none;}
.nav-link:hover{background:var(--surface2);}
.nav-link.active{background:var(--green-dim);color:var(--green);font-weight:500;}
.wrap{max-width:640px;margin:0 auto;padding:20px 14px 80px;}
.ev-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.ev-name{font-size:15px;font-weight:700;}
.ev-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat-num{font-size:26px;font-weight:700;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.search-wrap{position:relative;margin-bottom:13px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:10px 12px 10px 34px;font-size:14px;font-family:inherit;}
.search-input:focus{outline:none;border-color:var(--accent);}
.sec-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}
.vcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:border-color .2s;}
.vcard.checked{border-color:rgba(22,163,74,.3);background:rgba(22,163,74,.02);}
.vcard.priority{border-left:3px solid var(--amber);}
.vcard.priority.checked{border-left:3px solid var(--green);}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.vi{flex:1;min-width:0;}
.vname{font-size:15px;font-weight:600;}
.vtitle{font-size:12px;color:var(--muted);margin-top:1px;}
.vnote{font-size:11px;color:var(--amber);margin-top:2px;}
.vtime{font-size:12px;color:var(--green);font-weight:500;margin-top:3px;}
.badge{display:inline-flex;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.badge-vip{background:rgba(217,119,6,.1);color:var(--amber);}
.btn-checkin{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:none;white-space:nowrap;transition:all .15s;}
.btn-checkin.pending{background:var(--accent);color:#fff;}
.btn-checkin.pending:hover{background:#1557b0;}
.btn-checkin.done{background:var(--green-dim);color:var(--green);border:1px solid rgba(22,163,74,.25);cursor:default;}
.priority-leaving{opacity:.6;transition:opacity 5s ease;border-left-color:var(--muted)!important;}
.priority-leaving .vname::after{content:' → 移至一般';font-size:11px;color:var(--muted);font-weight:400;margin-left:6px;}
.avatar-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border2);}
.btn-undo{display:block;margin-top:4px;padding:4px 9px;font-size:11px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-family:inherit;}
.btn-undo:hover{color:var(--red);border-color:var(--red);}
.notes-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-top:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.notes-title{font-size:13px;font-weight:600;margin-bottom:10px;}
.note-item{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 11px;margin-bottom:6px;font-size:13px;border-left:3px solid var(--accent);}
.note-meta{font-size:11px;color:var(--muted);margin-top:2px;}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:8px 11px;font-size:13px;font-family:inherit;resize:none;}
textarea:focus{outline:none;border-color:var(--accent);}
.btn-sm{padding:7px 13px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:transparent;color:var(--text);}
.btn-sm:hover{background:var(--surface2);}
.statusbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:9px 18px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);}
.conn-ok{color:var(--green);}
.conn-err{color:var(--red);}
.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:#14532d;border:1px solid rgba(22,163,74,.4);color:#86efac;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;display:none;z-index:100;white-space:nowrap;}
.toast.show{display:block;animation:sd .25s ease;}
@keyframes sd{from{transform:translateX(-50%) translateY(-6px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.error-banner{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:var(--radius);padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;}
#no-results{display:none;text-align:center;color:var(--muted);font-size:14px;padding:36px 0;}

/* ════════════════════════════════
   手機直式 RWD（≤ 480px）
════════════════════════════════ */
@media (max-width: 480px) {
  .topbar { padding: 0 12px; height: 48px; }
  .logo { font-size: 13px; }
  .nav-link { padding: 4px 8px; font-size: 11px; }

  .wrap { padding: 14px 10px 72px; }

  .ev-banner { flex-direction: column; align-items: flex-start; gap: 4px; padding: 10px 13px; }
  .ev-name { font-size: 14px; }
  .ev-meta { font-size: 11px; }
  #clock { font-size: 12px; align-self: flex-end; }

  .stats { grid-template-columns: repeat(3,1fr); gap: 6px; }
  .stat { padding: 9px 6px; }
  .stat-num { font-size: 22px; }
  .stat-lbl { font-size: 10px; }

  .search-input { font-size: 14px; padding: 10px 12px 10px 32px; }
  .search-icon { font-size: 13px; left: 9px; }

  .sec-label { font-size: 10px; margin-bottom: 6px; }

  .vcard { padding: 11px 10px; gap: 9px; }
  .avatar { width: 36px; height: 36px; font-size: 13px; }
  .avatar-photo { width: 36px; height: 36px; }
  .vname { font-size: 13px; }
  .vtitle { font-size: 11px; }
  .vnote { font-size: 10px; }
  .vtime { font-size: 11px; }

  .btn-checkin { padding: 8px 14px; font-size: 12px; }
  .btn-undo { font-size: 10px; padding: 3px 7px; }

  .notes-box { padding: 12px 12px; }
  .notes-title { font-size: 12px; }
  .note-item { font-size: 12px; padding: 7px 9px; }
  .note-meta { font-size: 10px; }
  textarea { font-size: 12px; padding: 7px 9px; }
  .btn-sm { font-size: 11px; padding: 6px 11px; }

  .statusbar { padding: 8px 12px; font-size: 10px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="pulse"></div>報到區</div>
  <div class="nav-links">
    <a href="00-setup.html" class="nav-link">⚙ 設定</a>
    <a href="01-checkin.html" class="nav-link active">📋 報到區</a>
    <a href="02-stage.html" class="nav-link">🎤 舞台看板</a>
  </div>
</div>

<div class="wrap">
  <div id="err-banner" class="error-banner"></div>

  <div class="ev-banner">
    <div>
      <div class="ev-name" id="ev-name">載入中...</div>
      <div class="ev-meta" id="ev-meta"></div>
    </div>
    <div id="clock" style="font-size:13px;color:var(--muted);text-align:right;"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total" style="color:var(--accent)">—</div><div class="stat-lbl">受邀</div></div>
    <div class="stat"><div class="stat-num" id="s-done" style="color:var(--green)">0</div><div class="stat-lbl">已報到</div></div>
    <div class="stat"><div class="stat-num" id="s-pend" style="color:var(--amber)">—</div><div class="stat-lbl">待到</div></div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search" placeholder="搜尋姓名或職稱…" oninput="renderCards()">
  </div>

  <div class="sec-label">主要貴賓</div>
  <div id="list-vip"></div>
  <div class="sec-label" style="margin-top:14px;">一般貴賓</div>
  <div id="list-normal"></div>
  <div id="no-results">查無結果</div>

  <div class="notes-box">
    <div class="notes-title">📨 舞台端備註</div>
    <div id="notes-list"><div style="color:var(--muted);font-size:13px;">尚無備註</div></div>
    <div style="margin-top:10px;">
      <textarea id="my-note" rows="2" placeholder="傳送備註給舞台端…"></textarea>
      <div style="margin-top:7px;"><button class="btn-sm" onclick="sendNote()">📤 傳送備註</button></div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="conn" class="conn-ok">● 連線中</span>
  <span id="last-upd"></span>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  ★ 在此填入 Apps Script 部署網址，所有裝置共用 ★
const HARDCODED_API_URL = 'https://script.google.com/macros/s/AKfycbw0_bNl1sJB_ARNjMqKWUGfWERaXoo5W-H1X6W3Q-TYVcO7fLQ7p48z9rvLA5j1dshVnA/exec';
// ═══════════════════════════════════════════════════

const KEY = 'vip_gs_config';
const COLORS = ['#1a73e8','#16a34a','#7c3aed','#ea580c','#db2777','#0891b2'];
let vips = {}, colorMap = {}, apiUrl = '';
let pollTimer = null;

function init() {
  apiUrl = HARDCODED_API_URL || (stored().apiUrl || '');
  if (!apiUrl) { showErr('請將 Apps Script 網址填入 01-checkin.html 第一行 HARDCODED_API_URL，或在 <a href="00-setup.html">設定頁</a> 儲存網址後用同一裝置開啟。'); return; }
  loadAll();
}

async function loadAll() {
  vips = {};
  try {
    const res = await fetch(apiUrl + '?action=all&t=' + Date.now());
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    
    if (data.eventInfo) {
      document.getElementById('ev-name').textContent = data.eventInfo['活動名稱'] || '活動';
      const parts = [data.eventInfo['日期'], data.eventInfo['地點'], data.eventInfo['時間']].filter(Boolean);
      const formatted = parts.map(p => {
        if (!p) return p;
        const s = String(p);
        const dateOnly = s.includes('T') ? s.split('T')[0] : s;
        return dateOnly.replace(/-/g, '/');
      });
      document.getElementById('ev-meta').textContent = formatted.join(' · ');
    }
    
    data.vips.forEach((v, i) => {
      v.id    = String(v.id    ?? '');
      v.name  = String(v.name  ?? '');
      v.title = String(v.title ?? '');
      v.note  = String(v.note  ?? '');
      v.photo = String(v.photo ?? '');
      vips[v.id] = v;
      colorMap[v.id] = COLORS[i % COLORS.length];
    });
    renderCards();
    updateStats();
    renderNotes(data.notes);
    setConn(true);
  } catch(e) {
    showErr('載入失敗：' + e.message);
    setConn(false);
  }
  pollTimer = setInterval(poll, 5000);
}

async function poll() {
  try {
    const res = await fetch(apiUrl + '?action=poll&t=' + Date.now());
    const data = await res.json();
    if (data.error) return;
    
    const incomingIds = new Set(Object.keys(data.checkins));
    const localIds    = new Set(Object.keys(vips));
    const hasNew      = [...incomingIds].some(id => !localIds.has(id));
    
    // 如果有新貴賓加入，才重新載入全部
    if (hasNew) { await loadAll(); return; }
    
    let deleted = false;
    [...localIds].forEach(id => {
      if (!incomingIds.has(id)) {
        delete vips[id];
        deleted = true;
      }
    });
    
    let needsFullRender = deleted;
    let statsChanged = false;
    const priorityDowngrades = [];

    Object.entries(data.checkins).forEach(([id, info]) => {
      if (!vips[id]) return;
      const oldPriority = vips[id].priority;
      const newPriority = String(info.priority || 'normal');
      const oldChecked = vips[id].checked;

      // 🔥 修正點 1：後端 poll 不會傳照片，所以如果沒傳，就保留原有的照片網址
      const incomingPhoto = (info.photo !== undefined && info.photo !== '') ? info.photo : vips[id].photo;

      // 判斷資料是否真的有異動（排除照片的誤判）
      if (oldChecked !== info.checked  ||
          vips[id].time     !== info.time      ||
          vips[id].note     !== info.note      ||
          vips[id].name     !== info.name      ||
          vips[id].title    !== info.title     ||
          oldPriority       !== newPriority) {
        
        // 判斷是否「只是報到狀態改變」
        const isOnlyStatusChange = 
          (oldChecked !== info.checked) && 
          (oldPriority === newPriority) &&
          (vips[id].name === info.name) && 
          (vips[id].title === info.title);

        // 更新本機資料
        vips[id].checked  = info.checked;
        vips[id].time     = info.time;
        vips[id].note     = info.note;
        vips[id].name     = String(info.name  || vips[id].name  || '');
        vips[id].title    = String(info.title || vips[id].title || '');
        vips[id].priority = newPriority;
        vips[id].photo    = incomingPhoto; // 寫入正確的照片網址

        if (oldPriority !== newPriority && newPriority === 'normal') {
          priorityDowngrades.push(id);
          needsFullRender = true;
        } else if (isOnlyStatusChange && !needsFullRender) {
          // 🔥 核心優化：只改變報到狀態時，直接操作 DOM，不重刷畫面
          updateCardState(id);
          statsChanged = true;
        } else {
          // 其他欄位（姓名、職稱）修改，才整頁重繪
          needsFullRender = true;
        }
      }
    });

    if (needsFullRender) {
      if (priorityDowngrades.length > 0) {
        priorityDowngrades.forEach(id => { vips[id]._pendingNormal = true; });
        renderCards(); updateStats();
        setTimeout(() => {
          priorityDowngrades.forEach(id => { if (vips[id]) delete vips[id]._pendingNormal; });
          renderCards(); updateStats();
        }, 5000);
      } else {
        renderCards();
        updateStats();
      }
    } else if (statsChanged) {
      updateStats();
    }
    
    renderNotes(data.notes);
    setConn(true);
    setUpd();
  } catch(e) { setConn(false); }
}

async function doCheckin(id) {
  const btn = document.getElementById('btn-chk-' + id);
  if (btn) {
    btn.disabled = true;
    btn.textContent = '處理中...';
    btn.style.opacity = '0.7';
  }
  
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  try {
    const res = await fetch(apiUrl + '?action=checkin&id=' + encodeURIComponent(id) + '&time=' + encodeURIComponent(time));
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    
    vips[id].checked = true; 
    vips[id].time = time;
    
    updateCardState(id);
    updateStats();
    toast('✓ ' + vips[id].name + ' 報到 ' + time);
  } catch(e) { 
    alert('報到失敗：' + e.message); 
    if(btn) {
        btn.disabled = false;
        btn.textContent = '報到';
        btn.style.opacity = '1';
    }
  }
}

async function undoCheckin(id) {
  if (!confirm('確定撤銷 ' + vips[id].name + ' 的報到？')) return;
  const btn = document.getElementById('btn-undo-' + id);
  if (btn) btn.disabled = true;
  
  try {
    const res = await fetch(apiUrl + '?action=undo&id=' + encodeURIComponent(id));
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    
    vips[id].checked = false; 
    vips[id].time = '';
    
    updateCardState(id);
    updateStats();
    toast('已撤銷報到');
  } catch(e) { 
    alert('撤銷失敗：' + e.message); 
    if(btn) btn.disabled = false;
  }
}

async function sendNote() {
  const text = document.getElementById('my-note').value.trim();
  if (!text) return;
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  try {
    await fetch(apiUrl + '?action=note&text=' + encodeURIComponent(text) + '&from=' + encodeURIComponent('報到區') + '&time=' + encodeURIComponent(time));
    document.getElementById('my-note').value = '';
    toast('備註已傳送');
  } catch(e) {}
}

function renderCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const pList = [], nList = [];
  Object.values(vips).forEach(v => {
    if (q && !v.name.toLowerCase().includes(q) && !v.title.toLowerCase().includes(q)) return;
    const effectivePriority = v._pendingNormal ? 'vip' : v.priority;
    (effectivePriority === 'vip' ? pList : nList).push(v);
  });
  document.getElementById('list-vip').innerHTML = pList.map(card).join('');
  document.getElementById('list-normal').innerHTML = nList.map(card).join('');
  document.getElementById('no-results').style.display = (pList.length + nList.length === 0) ? 'block' : 'none';
}

function card(v) {
  v.name  = String(v.name  || '');
  v.title = String(v.title || '');
  const c = colorMap[v.id] || '#1a73e8';
  
  // 🔥 修正點 2：加入 loading="lazy"
  const avatarHtml = v.photo
    ? `<img src="${v.photo}" class="avatar-photo" loading="lazy" alt="${v.name}" onerror="this.outerHTML='<div class=\'avatar\' style=\'background:${c}18;color:${c}\'>${v.name.charAt(0)}</div>'">`
    : `<div class="avatar" style="background:${c}18;color:${c}">${v.name.charAt(0)}</div>`;
    
  const pendingClass = v._pendingNormal ? ' priority-leaving' : '';
  const effectiveClass = (v._pendingNormal || v.priority === 'vip') ? 'priority' : '';
  
  return `<div id="vcard-${v.id}" class="vcard ${v.checked?'checked':''} ${effectiveClass}${pendingClass}">
    ${avatarHtml}
    <div class="vi">
      <div class="vname">${v.name} ${v.priority==='vip'?'<span class="badge badge-vip">★ 主要</span>':''}</div>
      <div class="vtitle">${v.title}</div>
      ${v.note?`<div class="vnote">📌 ${v.note}</div>`:''}
      <div id="vtime-wrap-${v.id}" style="display:${v.checked?'block':'none'}">
        <div class="vtime">✓ <span id="vtime-text-${v.id}">${v.time}</span> 報到</div>
      </div>
    </div>
    <div id="vaction-${v.id}" style="text-align:center;flex-shrink:0;">
      ${v.checked
        ? `<div class="btn-checkin done">✓ 已報到</div><button id="btn-undo-${v.id}" class="btn-undo" onclick="undoCheckin('${v.id}')">撤銷</button>`
        : `<button id="btn-chk-${v.id}" class="btn-checkin pending" onclick="doCheckin('${v.id}')">報到</button>`}
    </div>
  </div>`;
}

function updateCardState(id) {
  const v = vips[id];
  const card = document.getElementById('vcard-' + id);
  const timeWrap = document.getElementById('vtime-wrap-' + id);
  const timeText = document.getElementById('vtime-text-' + id);
  const actionDiv = document.getElementById('vaction-' + id);

  if (!card) return; 

  if (v.checked) {
    card.classList.add('checked');
    if (timeWrap) timeWrap.style.display = 'block';
    if (timeText) timeText.textContent = v.time;
    if (actionDiv) {
      actionDiv.innerHTML = `<div class="btn-checkin done">✓ 已報到</div><button id="btn-undo-${v.id}" class="btn-undo" onclick="undoCheckin('${v.id}')">撤銷</button>`;
    }
  } else {
    card.classList.remove('checked');
    if (timeWrap) timeWrap.style.display = 'none';
    if (actionDiv) {
      actionDiv.innerHTML = `<button id="btn-chk-${v.id}" class="btn-checkin pending" onclick="doCheckin('${v.id}')">報到</button>`;
    }
  }
}

function renderNotes(notes) {
  const el = document.getElementById('notes-list');
  if (!notes || !notes.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px;">尚無備註</div>'; return; }
  el.innerHTML = notes.map(n => {
    const fromColor = n.from === '貴賓備註' ? '#d97706' : n.from === '舞台區' ? '#7c3aed' : '#1a73e8';
    const timeStr = n.time ? ' · ' + n.time : '';
    return `<div class="note-item"><span style="font-size:11px;font-weight:600;color:${fromColor};margin-right:6px;">[${n.from}]</span>${n.text}<div class="note-meta">${timeStr}</div></div>`;
  }).join('');
}

function updateStats() {
  const all = Object.values(vips);
  const done = all.filter(v => v.checked).length;
  document.getElementById('s-total').textContent = all.length;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pend').textContent = all.length - done;
}

function setConn(ok) {
  const el = document.getElementById('conn');
  el.textContent = ok ? '● 連線中' : '● 連線中斷';
  el.className = ok ? 'conn-ok' : 'conn-err';
}

function setUpd() {
  const now = new Date();
  document.getElementById('last-upd').textContent =
    `上次同步 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

function showErr(msg) { const el = document.getElementById('err-banner'); el.innerHTML = '⚠ ' + msg; el.style.display = 'block'; }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; setTimeout(()=>t.className='toast',3000); }
function stored() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }

setInterval(() => {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}, 1000);

init();
</script>
</body>
</html>
